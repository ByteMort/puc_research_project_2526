<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Token PoC</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 2rem;
      padding: 2rem;
      min-height: 100vh;
    }
    .panel {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1.5rem;
      width: 320px;
    }
    h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #e94560; }
    h3 { margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { background: #c73652; }
    button:disabled { background: #555; cursor: not-allowed; }
    #qr-container {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      margin: 1rem 0;
      min-height: 168px;
      align-items: center;
    }
    #token-display {
      font-size: 0.6rem;
      word-break: break-all;
      color: #aaa;
      margin-bottom: 0.5rem;
    }
    #timer-bar-container {
      background: #0f3460;
      border-radius: 4px;
      height: 8px;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    #timer-bar {
      height: 100%;
      background: #e94560;
      transition: width 1s linear, background 1s;
      width: 100%;
    }
    #timer-label { font-size: 0.85rem; color: #aaa; text-align: center; }
    .status-box {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-ok    { background: #0d3b2e; border: 1px solid #2ecc71; color: #2ecc71; }
    .status-error { background: #3b0d0d; border: 1px solid #e74c3c; color: #e74c3c; }
    .status-idle  { background: #1a1a2e; border: 1px solid #555;    color: #aaa; }
    textarea {
      width: 100%;
      height: 80px;
      background: #0f3460;
      border: 1px solid #555;
      border-radius: 8px;
      color: #eee;
      padding: 0.5rem;
      font-size: 0.75rem;
      resize: none;
      margin-top: 0.5rem;
    }
    #scan-log { margin-top: 1rem; }
    .log-entry {
      font-size: 0.8rem;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.4rem;
    }
    .log-ok    { background: #0d3b2e; color: #2ecc71; }
    .log-error { background: #3b0d0d; color: #e74c3c; }
    label { font-size: 0.85rem; color: #aaa; display: block; margin-top: 1rem; }
    input[type=range] { width: 100%; margin-top: 0.25rem; }
  </style>
</head>
<body>

<!-- LEFT: Student panel (generates QR) -->
<div class="panel">
  <h2>👤 Student — Generate QR</h2>

  <label>Token lifetime: <span id="lifetime-label">10</span>s</label>
  <input type="range" id="lifetime" min="5" max="30" value="10"
         oninput="document.getElementById('lifetime-label').textContent = this.value">

  <button id="gen-btn" onclick="generateToken()">Generate QR Token</button>

  <div id="qr-container">
    <span style="color:#aaa;font-size:0.85rem">No token yet</span>
  </div>

  <h3>Raw token</h3>
  <div id="token-display">—</div>

  <div id="timer-bar-container" style="display:none">
    <div id="timer-bar"></div>
  </div>
  <div id="timer-label"></div>
</div>

<!-- RIGHT: Company panel (scans / validates) -->
<div class="panel">
  <h2>🏢 Company — Scan QR</h2>

  <h3>Paste token to simulate scan</h3>
  <textarea id="scan-input" placeholder="Token will auto-fill when generated..."></textarea>

  <button onclick="scanToken()">Scan Token</button>

  <div id="scan-status" class="status-box status-idle">
    Waiting for scan...
  </div>

  <div id="scan-log"></div>
</div>

<script>
  // ── Token store (simulates the in-memory ConcurrentHashMap) ──────────────
  const tokenStore = new Map(); // token -> { studentId, expiresAt }

  let currentToken = null;
  let timerInterval = null;

  function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function generateToken() {
    // Clear any existing timer
    if (timerInterval) clearInterval(timerInterval);

    const lifetimeMs = parseInt(document.getElementById('lifetime').value) * 1000;
    const token = generateUUID();
    const expiresAt = Date.now() + lifetimeMs;

    // Simulate the server removing any old token for this student
    if (currentToken) tokenStore.delete(currentToken);

    // Store it (like the server's ConcurrentHashMap + scheduled removal)
    tokenStore.set(token, { studentId: 42, expiresAt });
    currentToken = token;

    // Schedule auto-expiry (mirrors scheduler.schedule(() -> tokenStore.remove(token)))
    setTimeout(() => {
      tokenStore.delete(token);
      if (currentToken === token) {
        document.getElementById('timer-label').textContent = '⛔ Token expired';
        document.getElementById('timer-bar').style.width = '0%';
        document.getElementById('timer-bar').style.background = '#555';
        currentToken = null;
      }
    }, lifetimeMs);

    // Render QR code
    document.getElementById('qr-container').innerHTML = '';
    new QRCode(document.getElementById('qr-container'), {
      text: token,
      width: 150,
      height: 150,
      colorDark: '#000',
      colorLight: '#fff',
    });

    document.getElementById('token-display').textContent = token;
    document.getElementById('scan-input').value = token;
    document.getElementById('timer-bar-container').style.display = 'block';

    // Animate countdown bar
    const bar = document.getElementById('timer-bar');
    bar.style.transition = 'none';
    bar.style.width = '100%';
    bar.style.background = '#e94560';

    let elapsed = 0;
    timerInterval = setInterval(() => {
      elapsed += 1000;
      const pct = Math.max(0, 100 - (elapsed / lifetimeMs) * 100);
      bar.style.transition = 'width 1s linear';
      bar.style.width = pct + '%';
      const remaining = Math.ceil((lifetimeMs - elapsed) / 1000);
      document.getElementById('timer-label').textContent =
        remaining > 0 ? `⏱ Expires in ${remaining}s` : '';
      if (elapsed >= lifetimeMs) clearInterval(timerInterval);
    }, 1000);
  }

  function scanToken() {
    const token = document.getElementById('scan-input').value.trim();
    const statusBox = document.getElementById('scan-status');
    const log = document.getElementById('scan-log');

    if (!token) {
      setStatus(statusBox, 'error', '⚠️ No token entered');
      return;
    }

    const entry = tokenStore.get(token);

    if (!entry) {
      // Token not found = expired OR already used OR never existed
      setStatus(statusBox, 'error', '❌ Invalid or expired token — rejected');
      addLog(log, false, `REJECTED — token not in store`);
      return;
    }

    if (Date.now() > entry.expiresAt) {
      tokenStore.delete(token);
      setStatus(statusBox, 'error', '❌ Token expired — rejected');
      addLog(log, false, `REJECTED — token expired`);
      return;
    }

    // ✅ Valid: consume the token (one-time use)
    tokenStore.delete(token);
    currentToken = null;

    setStatus(statusBox, 'ok', `✅ Valid! Student ID: ${entry.studentId} — token consumed`);
    addLog(log, true, `ACCEPTED — student ${entry.studentId} — token consumed`);

    // Update student panel to reflect token is gone
    document.getElementById('timer-label').textContent = '✅ Token used — generate a new one';
    document.getElementById('timer-bar').style.background = '#2ecc71';
    if (timerInterval) clearInterval(timerInterval);
  }

  function setStatus(box, type, msg) {
    box.className = 'status-box status-' + (type === 'ok' ? 'ok' : 'error');
    box.textContent = msg;
  }

  function addLog(container, ok, msg) {
    const div = document.createElement('div');
    div.className = 'log-entry ' + (ok ? 'log-ok' : 'log-error');
    div.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
    container.prepend(div);
  }
</script>
</body>
</html>
